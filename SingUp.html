<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Shine Makeup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon">
                <h2 class="logo">Shine</h2>
            </div>
            <div class="menu">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="login.html">LOGIN</a></li>
                    <li><a href="faq.html">FAQ</a></li>
                </ul>
            </div>
        </div>

        <div class="register-container">
            <div class="register-form">
                <h2>SING UP TO DISCOVER <br> YOUR SHINE </h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" name="firstname" placeholder="first name"  required>
                    </div>
                    <div class="form-group">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" name="lastname" placeholder="last name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="example@example.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="********" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="********" required>
                    </div>
                    <div class="form-group checkbox">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter">Subscribe to our newsletter</label>
                    </div>
                    <button type="submit" class="register-btn">SING UP</button>
                </form>
                <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>
            </div>
            <!-- <div class="register-benefits">
                <h3>JOIN SHINE AND ENJOY THESE BENEFITS:</h3>
                <ul>
                    <li><i class="fas fa-check"></i> Faster checkout</li>
                    <li><i class="fas fa-check"></i> Order history</li>
                    <li><i class="fas fa-check"></i> Wishlist feature</li>
                    <li><i class="fas fa-check"></i> Exclusive offers</li>
                    <li><i class="fas fa-check"></i> Members-only discounts</li>
                </ul>
            </div> -->
        </div>

        <footer>
            <div class="footer-content">
                <div class="footer-section">
                    <h3>SHINE</h3>
                    <p>Premium makeup products for every beauty need with 15% VAT included</p>
                </div>
                <div class="footer-section">
                    <h3>QUICK LINKS</h3>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="#">Products</a></li>
                        <li><a href="faq.html">FAQ</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>CONTACT US</h3>
                    <p>info@shine.com</p>
                    <p>+966 55 123 4567</p>
                    <div class="social-icons">
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
