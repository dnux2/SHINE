<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Shine Makeup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon">
                <h2 class="logo">Shine</h2>
            </div>
            <div class="menu">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="SingUp.html">SING UP</a></li>
                    <li><a href="faq.html">FAQ</a></li>
                </ul>
            </div>
        </div>

        <div class="login-container">
            <div class="login-form">
                <h2>WELCOME BACK</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="login-email"> Email </label>
                        <input type="email" id="login-email" name="email" placeholder="example@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" placeholder="********" required>
                    </div>
                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    <button type="submit" class="login-btn">LOGIN</button>
                </form>
                
                <p class="register-link">Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>

        
    </div>
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>SHINE</h3>
                <p>Premium makeup products for every beauty need with 15% VAT included</p>
            </div>
            <div class="footer-section">
                <h3>QUICK LINKS</h3>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="faq.html">FAQ</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3>CONTACT US</h3>
                <p>info@shine.com</p>
                <p>+966 55 123 4567</p>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
